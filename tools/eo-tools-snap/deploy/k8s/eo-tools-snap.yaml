apiVersion: v1
kind: Namespace
metadata:
  name: eo-tools
---
apiVersion: v1
kind: Secret
metadata:
  name: eo-tools-snap-store-config
  namespace: eo-tools
  labels:
    app.kubernetes.io/name: eo-tools-snap
    app.kubernetes.io/part-of: eo-tools
type: Opaque
stringData:
  store.json: |
    {
      "backends": {
        "s3": {
          "endpoint_url": "http://minio.eo-infra.svc.cluster.local:9000",
          "region_name": "us-east-1",
          "aws_access_key_id": "geosprite",
          "aws_secret_access_key": "geospriteo",
          "addressing_style": "path",
          "verify_tls": false,
          "max_concurrency": 4,
          "create_bucket_if_missing": true
        },
        "aria2_http": {
          "workspace": "/work/aria2",
          "host": "http://127.0.0.1",
          "port": 6800,
          "secret": "eo-aria2-secret",
          "rpc_timeout_seconds": 60,
          "transfer_timeout_seconds": 7200,
          "poll_interval_seconds": 0.5,
          "split": 8,
          "max_connection_per_server": 8,
          "min_split_size": "1M"
        }
      },
      "localization": {
        "input_parameter": "input_files",
        "preserve_path_structure": true,
        "bucket": "geosprite",
        "prefix": "eo-store/localized",
        "temp_dir_prefix": null
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eo-tools-snap-rest
  namespace: eo-tools
  labels:
    app.kubernetes.io/name: eo-tools-snap-rest
    app.kubernetes.io/component: rest
    app.kubernetes.io/part-of: eo-tools
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: eo-tools-snap-rest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eo-tools-snap-rest
        app.kubernetes.io/component: rest
        app.kubernetes.io/part-of: eo-tools
    spec:
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: rest
          image: eo-tools-snap:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - eo-tools
          args:
            - serve-rest
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --root-path
            - /eo-tools
            - --service-path
            - /snap
            - --workdir
            - /work/runtime
            - --store-config
            - /etc/eo-tools/store/store.json
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: work
              mountPath: /work
            - name: store-config
              mountPath: /etc/eo-tools/store
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 16Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
        - name: aria2
          image: eo-tools-snap:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
          args:
            - >
              aria2c
              --enable-rpc=true
              --rpc-listen-all=true
              --rpc-listen-port=6800
              --rpc-secret="${ARIA2_RPC_SECRET}"
              --dir=/work/aria2
              --continue=true
              --max-concurrent-downloads=4
              --max-connection-per-server=8
              --split=8
              --min-split-size=1M
          env:
            - name: ARIA2_RPC_SECRET
              value: eo-aria2-secret
          ports:
            - name: aria2-rpc
              containerPort: 6800
          volumeMounts:
            - name: work
              mountPath: /work
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
      volumes:
        - name: work
          emptyDir:
            sizeLimit: 100Gi
        - name: store-config
          secret:
            secretName: eo-tools-snap-store-config
---
apiVersion: v1
kind: Service
metadata:
  name: eo-tools-snap
  namespace: eo-tools
  labels:
    app.kubernetes.io/name: eo-tools-snap
    app.kubernetes.io/part-of: eo-tools
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: eo-tools-snap-rest
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: eo-tools-snap-strip-prefix
  namespace: eo-tools
  labels:
    app.kubernetes.io/name: eo-tools-snap
    app.kubernetes.io/part-of: eo-tools
spec:
  stripPrefix:
    prefixes:
      - /eo-tools
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eo-tools-snap
  namespace: eo-tools
  labels:
    app.kubernetes.io/name: eo-tools-snap
    app.kubernetes.io/part-of: eo-tools
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: eo-tools-eo-tools-snap-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /eo-tools/snap
            pathType: Prefix
            backend:
              service:
                name: eo-tools-snap
                port:
                  number: 80
