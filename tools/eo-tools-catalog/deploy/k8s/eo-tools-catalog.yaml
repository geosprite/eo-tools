apiVersion: v1
kind: Namespace
metadata:
  name: eo-tools
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eo-tools-catalog-rest
  namespace: eo-tools
  labels:
    app.kubernetes.io/name: eo-tools-catalog-rest
    app.kubernetes.io/component: rest
    app.kubernetes.io/part-of: eo-tools
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: eo-tools-catalog-rest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eo-tools-catalog-rest
        app.kubernetes.io/component: rest
        app.kubernetes.io/part-of: eo-tools
    spec:
      containers:
        - name: rest
          image: registry.example.com/geosprite/eo-tools-catalog:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - eo-tools
          args:
            - serve-rest
            - --tool-package
            - geosprite.eo.tools.catalog
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eo-tools-catalog-mcp
  namespace: eo-tools
  labels:
    app.kubernetes.io/name: eo-tools-catalog-mcp
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: eo-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eo-tools-catalog-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eo-tools-catalog-mcp
        app.kubernetes.io/component: mcp
        app.kubernetes.io/part-of: eo-tools
    spec:
      containers:
        - name: mcp
          image: registry.example.com/geosprite/eo-tools-catalog:0.1.0
          imagePullPolicy: IfNotPresent
          stdin: true
          tty: false
          command:
            - eo-tools
          args:
            - serve-mcp
            - --tool-package
            - geosprite.eo.tools.catalog
            - --name
            - eo-tools-catalog
            - --version
            - 0.1.0
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          livenessProbe:
            exec:
              command:
                - eo-tools
                - list
                - --tool-package
                - geosprite.eo.tools.catalog
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: eo-tools-catalog
  namespace: eo-tools
  labels:
    app.kubernetes.io/name: eo-tools-catalog
    app.kubernetes.io/part-of: eo-tools
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: eo-tools-catalog-rest
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eo-tools-catalog
  namespace: eo-tools
  labels:
    app.kubernetes.io/name: eo-tools-catalog
    app.kubernetes.io/part-of: eo-tools
spec:
  ingressClassName: traefik
  rules:
    - host: catalog.eo-tools.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eo-tools-catalog
                port:
                  number: 80
