[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    msi: MSI (Multispectral Imagery) search tests
    sar: SAR (Synthetic Aperture Radar) search tests
    match: Multi-collection matching tests
    utility: Utility endpoint tests
    integration: Integration tests with real API
